services:
  - type: web
    name: clujhackathon2026-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://cluj-hackathon2026.vercel.app
      - key: CORS_ORIGIN_REGEX
        value: ^https://cluj-hackathon2026(-[a-z0-9-]+)?\.vercel\.app$
      - key: DEBUG
        value: "false"
